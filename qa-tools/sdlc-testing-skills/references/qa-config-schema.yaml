# ============================================================
# QA CONFIG — [Project name] | [Sprint]
# Auto-generated by skill 01.1 from Test Plan
# Serves as the canonical config source for all skills; each skill reads only the relevant fields as needed
# ============================================================

project:
  name: <Project name>
  code: <project code, e.g. BM — used as prefix for TC ID, bug ID>
  sprint: <Sprint-XX>
  sprint_start: <yyyy-mm-dd>        # sprint start date (inclusive)
  sprint_end: <yyyy-mm-dd>          # sprint end date (inclusive)
  domain: <fintech>
  architecture: <api-only|UI-web|AI-based>

# ── TEAM ────────────────────────────────────────────────────
# Used by: skill 02 (test plan), skill 10 (report), skill 11 (demo)
# allocation_pct: % of working time dedicated to this sprint (0-100).
# Skills calculate: available_hours = sum(working_calendar.day_hours × allocation_pct/100) over sprint_start..sprint_end
team:
  qc_lead:
    name: <QC Lead name>
    allocation_pct: <0-100>
  qc_engineers:
    - name: <QC 1 name>
      allocation_pct: <0-100>
    - name: <QC 2 name>
      allocation_pct: <0-100>
  dev_lead: <Dev Lead name>        # optional — string only
  pm: <PM/PO name>                 # optional — string only

# ── WORKING CALENDAR ────────────────────────────────────────
# Used by: skill 02, 03 — calculate actual available hours per sprint period
# Formula: available_hours/person = sum(day_hours × allocation_pct/100) over sprint_start..sprint_end
working_calendar:
  hours_per_weekday: 7              # Mon–Fri (full day)
  hours_per_saturday: 3.5           # Saturday = half day = 0.5 × hours_per_weekday
  hours_per_sunday: 0               # Sunday = day off
  holiday_overrides: []             # Public holidays to deduct manually, e.g. ['2026-04-30']
  sprint_working_days: <number>     # Pre-calculated from sprint_start/end: full days + saturdays × 0.5 − holidays
  # Capacity formula: capacity/person = sprint_working_days × allocation_pct/100 × hours_per_weekday

# ── ENVIRONMENTS ────────────────────────────────────────────
# Used by: skill 01, 06, 09, 10, 11, 12, 14
environments:
  staging:
    url: <https://staging.example.com>
    auth_required: <true|false>
  uat:                            # optional
    url: <https://uat.example.com>
    auth_required: <true|false>
  production:                     # optional — only used by skill 14
    url: <https://example.com>

# ── REQUIREMENT SOURCES (optional) ─────────────────────────
# Used by: skill 02, 03, 04 when reading requirements directly from an external source outside the workspace
# NOTE: Do not store secrets/tokens directly in this file. Reference env var names or secret keys only.
requirement_sources:
  primary: <workspace-file|confluence>
  confluence:                           # optional — only needed when primary: confluence
    enabled: <true|false>
    base_url: <https://your-company.atlassian.net/wiki>
    auth:
      method: api_token                 # fixed default — do not use browser_session or mcp
      env_file: <.env.secrets>
      user_env: <ATLASSIAN_USER_EMAIL>
      token_env: <ATLASSIAN_API_TOKEN>  # required when method=api_token
    scope:
      page_tree_mode: target-parent-siblings  # default — reads target page + parent + siblings
      read_ancestors: <true|false>
      read_siblings: <true|false>
      max_pages: <number, e.g. 20>
    targeting:
      default_space_key: <HO>
      allowed_page_ids:
        - <3596058625>
      default_section_anchor: <US7>
    fetch:
      timeout_sec: <number, e.g. 30>
      retry_count: <number, e.g. 2>
      include_comments: <true|false>
      mode: <direct|snapshot>           # default: direct (no snapshot .md created)
      read_image_attachments: <true|false>     # default: true
      attachment_ocr_lang: <vie+eng>    # OCR language for image attachments
      attachment_max_images: <number, e.g. 20>   # maximum images to read/OCR per page
      expand_fields:
        - <body.storage>
        - <version>
        - <history>
    fallback:
      use_workspace_file_if_unreachable: <true|false>
      local_requirement_paths:
        - <project/requirement/module/requirement.md>

# ── TEST ACCOUNTS ───────────────────────────────────────────
# Used by: skill 06, 09, 10, 12, 14
# NOTE: Do not store passwords in this file — use a secrets manager
test_accounts:
  - role: admin
    username: <qa.admin@example.com>
    note: <describe permissions>
  - role: user
    username: <qa.user@example.com>
    note: <describe permissions>
  # Add other roles as needed: readonly, manager, guest...

# ── TOOLS ───────────────────────────────────────────────────
# Used by: skill 02, 03, 04, 06, 07, 08, 11
tools:
  test_management: <qmetry|jira|testng|testlink|azure-devops|other>
  bug_tracker: <jira|azure-devops|github-issues|other>
  atlassian:
    base_url_env: <ATLASSIAN_BASE_URL>
    email_env: <ATLASSIAN_EMAIL>
    token_env: <ATLASSIAN_API_TOKEN>
    confluence_space_key_env: <CONFLUENCE_SPACE_KEY>
    jira_project_key_env: <JIRA_PROJECT_KEY>
  qmetry:
    config_file: <tools/qmetry-config.json>
    token_env: <QMETRY_API_TOKEN>
  automation:
    ui:
      - <playwright|cypress|selenium|robotframework>
    api:
      - <pytest|restassured|postman-newman|robotframework>
    performance: <jmeter|artillery|locust|none>
  communication:
    channel: <#slack-channel or Teams channel>
    escalation: <#channel or escalation email>

# ── SCOPE ───────────────────────────────────────────────────
# Used by: skill 01, 02, 03, 04, 07, qa-specialist/03
scope:
  type: <regression|smoke|full>
  modules:
    - <module 1>
    - <module 2>
  exploratory_tier: <Quick|Standard|Exhaustive>  # default: Standard

# ── GOVERNANCE ──────────────────────────────────────────────
# Used by: skill 07 (review-tc), skill 08 (sprint report)
governance:
  mode: <lightweight|standard|enterprise>  # default: standard
  # lightweight: no QA Lead review required; use for small or personal projects
  # standard:    L2 — QA Lead review mandatory (SLA 24h)
  # enterprise:  L2 + L3 — QA Lead + Stakeholder review (SLA 48h)

# ── EXIT CRITERIA ────────────────────────────────────────────
# Used by: skill 07, 08, 13
exit_criteria:
  pass_rate: <number, e.g. 95>           # %
  health_score_baseline: <number, e.g. 80>  # /100
  max_s1_open: 0
  max_s2_open: <number>
  tc_executed_rate: <number, e.g. 100>   # % of TCs that must be executed

# ── SUSPENSION CRITERIA ──────────────────────────────────────
# Used by: skill 07, 13
suspension_criteria:
  blocked_tc_rate: <number, e.g. 30>     # % of TCs blocked before suspending
  env_down_hours: <number, e.g. 4>       # hours of environment downtime before suspending

# ── PERFORMANCE BASELINE ─────────────────────────────────────
# Used by: skill 11, 13, 14
# Overrides defaults in references/performance-baseline.md
performance:
  concurrent_users_normal: <number>       # normal concurrent users
  concurrent_users_peak: <number>         # peak — used for stress test
  api_p95_ms: <number>                    # P95 response time threshold (ms)
  api_error_rate_threshold: <number>      # maximum % error rate, e.g. 1
  page_load_lcp_s: <number>               # maximum LCP (seconds)
  rollback_error_rate: <number>           # % error rate triggering rollback after deploy, e.g. 5

# ── SECURITY ────────────────────────────────────────────────
# Used by: skill 10
security:
  focus:                              # list of prioritized OWASP categories
    - <A01>
    - <A03>
    - <A07>
  # If empty, skill 10 will check the full OWASP Top 10

# ── ACCESSIBILITY ────────────────────────────────────────────
# Used by: qa-specialist/03, skill 13
accessibility:
  required: <true|false>
  wcag_level: <AA|AAA>                # default: AA
  lighthouse_score_min: <number>      # default: 80

# ── UAT ─────────────────────────────────────────────────────
# Used by: skill 12, 13
uat:
  required: <true|false>
  stakeholders:
    - name: <stakeholder name>
      role: <Product Owner|Business Analyst|End User|...>
      department: <department>

# ── CRITICAL USER JOURNEYS ───────────────────────────────────
# Used by: skill 14 (smoke test production)
# List 5–10 most critical flows — if broken, a rollback is required
critical_user_journeys:
  - name: <short name, e.g. "login">
    description: <describe the flow in business language>
  - name: <short name, e.g. "checkout">
    description: <describe the flow>

# ── DEFINITION OF DONE ──────────────────────────────────────
# Used by: skill 08, 13
definition_of_done:
  - <TCs written and reviewed>
  - <Pass rate >= exit_criteria.pass_rate%>
  - <No S1 open>
  - <Sprint report sent to stakeholders>

# ── OUTPUT LANGUAGE ─────────────────────────────────────────
# Used by: all skills when writing output artifacts
output:
  language: vi  # vi | en — language for all output artifact content (test steps, expected results, descriptions)
  # vi:  Vietnamese with diacritical marks (default — for Vietnamese-speaking teams)
  # en:  English only (for international teams or English-only projects)
  # Skills check this field before generating output. If missing, default is 'vi'.

# ── OUTPUT PATHS (optional) ──────────────────────────────────
# Overrides the default path of each skill — remove this section to use the default folder structure
# Used by: all skills when saving output
output_paths:
  root: ~                             # default: testing-output/
  test_plan: ~                        # default: testing-output/test-plan/
  test_cases:
    hltc: ~                           # default: testing-output/test-cases/hltc/
    functional: ~                     # default: testing-output/test-cases/functional/
    sit: ~                            # default: testing-output/test-cases/sit/
    regression: ~                     # default: testing-output/test-cases/regression/
  test_data: ~                        # default: testing-output/test-data/
  automation: ~                       # default: testing-output/automation/
  demo: ~                             # default: testing-output/demo/
  reports:
    root: ~                           # default: testing-output/reports/
    daily: ~                          # default: testing-output/reports/daily/
    sprint: ~                         # default: testing-output/reports/sprint/
    security: ~                       # default: testing-output/reports/security/
    performance: ~                    # default: testing-output/reports/performance/
    accessibility: ~                  # default: testing-output/reports/accessibility/
  integrations:
    confluence_root: ~                # default: testing-output/confluence/
    jira_root: ~                      # default: testing-output/jira/
    qmetry_root: ~                    # default: testing-output/qmetry/

# ── ARTIFACT TRACEABILITY (optional) ───────────────────────
# Used by: skill 05, 07, 08
artifact_traceability:
  require_version_in_filename: <true|false>        # default: true
  require_timestamp_in_filename: <true|false>      # default: true
  require_result_manifest: <true|false>            # default: true
  version_scheme: <semver>                         # default: semver
  result_status:
    - SUCCESS
    - PARTIAL
    - FAILED
    - BLOCKED
  manifests:
    data_generation: ~                             # default: testing-output/test-data/
    test_run: ~                                    # default: testing-output/reports/daily/

# ── AUTOMATION RULES (optional) ───────────────────────────
# Used by: qa-automation/02 (gen script), skill 10 (report)
automation_rules:
  framework_primary: <robotframework>          # default: robotframework
  ui_engine: <browser-playwright|selenium>     # default: browser-playwright
  architecture:
    model: <4-layer>                           # default: 4-layer
    enforce_no_sql_in_testcase: <true|false>   # default: true
    enforce_no_business_assert_in_low_level: <true|false>  # default: true
  generation:
    require_mapping_matrix: <true|false>       # default: true
    require_dod_checklist: <true|false>        # default: true
  data_strategy:
    no_hardcode_sensitive_data: <true|false>   # default: true
    file_types:
      - <csv>
      - <json>
      - <yaml>
  test_level_policy:
    levels:
      - component
      - integration
      - e2e
    unit_test_in_scope: <true|false>            # default: false
    target_mix_percent:
      component: <number, e.g. 30>
      integration: <number, e.g. 50>
      e2e: <number, e.g. 20>
    mapping_rules:
      functional_default: <component|e2e>       # default: e2e
      sit_default: <integration>                # default: integration
      functional_with_external_dependency: <e2e>
      functional_single_screen_or_single_endpoint: <component>
      sit_multi_service_sync: <integration>
      sit_end_to_end_customer_journey: <e2e>
    output_convention:
      embed_test_level_in_tc_summary: <true|false>  # default: true
      summary_prefix_format: <[TL:{level}]>
